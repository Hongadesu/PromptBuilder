[tool.ruff]
preview = true
line-length = 80
exclude = [".venv", "venv", "__pycache__", "build", "dist"]

[tool.ruff.lint]
extend-select = [
    # 縮進相關規範
    "E111",
    "E112",
    "E113",
    "E114",
    "E115",
    "E116",
    "E117",

    # 逗號的空格規範
    "E201",
    "E202",
    "E203",
    "E204",
    "E211",
    "E221",
    "E222",
    "E223",
    "E224",
    "E225",
    "E226",
    "E227",
    "E228",
    "E231",
    "E241",
    "E242",

    # 函數參數的定義規範
    "E251",
    "E252",

    # 註釋旁的空格
    "E261",
    "E262",
    "E265",

    # keyword 旁的空格與 tab 規範
    "E271",
    "E272",
    "E273",
    "E274",

    # 空行相關規範
    "E301",
    "E302",
    "E303",
    "E304",
    "E305",
    "E306",

    # import 相關規範
    "E401",
    "E402",

    # 不允許單行的 colon 語句
    "E701",

    # None 的正確比較規範
    "E711",

    # isort 組別的相關規則
    "I",
]
ignore = ["F401", "F403", "F405", "F841"] # 忽略未使用的 module, function, variable
